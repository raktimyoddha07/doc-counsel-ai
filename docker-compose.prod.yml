services:
  db:
    image: postgres:15-alpine
    container_name: pdflens-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: raktimyoddha/pdflens-backend:latest
    container_name: pdflens-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    ports:
      - "8000:8000"

  frontend:
    image: raktimyoddha/pdflens-frontend:latest
    container_name: pdflens-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: